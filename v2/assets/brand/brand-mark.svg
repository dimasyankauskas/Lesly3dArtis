<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" aria-label="Lesly brand mark — L monogram in gold-bordered square">
  <!-- Outer gold-bordered square -->
  <rect x="6" y="6" width="88" height="88" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Inner subtle gold frame (4 corner brackets) -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <path d="M14 28 L14 14 L28 14"/>
    <path d="M72 14 L86 14 L86 28"/>
    <path d="M14 72 L14 86 L28 86"/>
    <path d="M86 72 L86 86 L72 86"/>
  </g>
  <!-- L monogram, italic serif, centered -->
  <text x="50" y="68"
        font-family="Playfair Display, Georgia, 'Times New Roman', serif"
        font-size="56"
        font-style="italic"
        font-weight="500"
        text-anchor="middle"
        fill="currentColor">L</text>
  <!-- Subtle decorative dot beneath -->
  <circle cx="50" cy="84" r="1.2" fill="currentColor"/>
</svg>
