<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">AI visualization economics board</title>
  <desc id="desc">Cost comparison chart for cloud generation versus local hybrid workflow.</desc>
  <rect width="900" height="675" fill="#f8f3e9"/>
  <rect x="42" y="42" width="816" height="591" fill="#fff8ee" stroke="#d6c6ae" stroke-width="3"/>
  <text x="78" y="116" fill="#14100c" font-family="Georgia,serif" font-size="44" letter-spacing="4">COST MODEL</text>
  <text x="80" y="156" fill="#5b554c" font-family="monospace" font-size="18" letter-spacing="2">CLOUD SPEND VS LOCAL HYBRID WORKFLOW</text>
  <g transform="translate(92 226)">
    <text x="0" y="0" fill="#5b554c" font-family="monospace" font-size="17">12 MO CLOUD</text>
    <rect x="0" y="20" width="650" height="34" fill="#d6c6ae"/>
    <rect x="0" y="20" width="650" height="34" fill="#9f4828"/>
    <text x="674" y="45" fill="#14100c" font-family="monospace" font-size="22">$24k</text>
  </g>
  <g transform="translate(92 330)">
    <text x="0" y="0" fill="#5b554c" font-family="monospace" font-size="17">12 MO LOCAL</text>
    <rect x="0" y="20" width="650" height="34" fill="#d6c6ae"/>
    <rect x="0" y="20" width="379" height="34" fill="#2f6a57"/>
    <text x="674" y="45" fill="#14100c" font-family="monospace" font-size="22">$14k</text>
  </g>
  <g transform="translate(92 456)">
    <rect width="218" height="88" fill="#14100c"/>
    <text x="26" y="46" fill="#f8f3e9" font-family="Georgia,serif" font-size="36">6.1 mo</text>
    <text x="28" y="70" fill="#d6c6ae" font-family="monospace" font-size="12" letter-spacing="2">BREAK-EVEN MODEL</text>
    <rect x="258" width="218" height="88" fill="#14100c"/>
    <text x="284" y="46" fill="#f8f3e9" font-family="Georgia,serif" font-size="36">$10k</text>
    <text x="286" y="70" fill="#d6c6ae" font-family="monospace" font-size="12" letter-spacing="2">AVOIDED SPEND</text>
    <rect x="516" width="218" height="88" fill="#14100c"/>
    <text x="542" y="46" fill="#f8f3e9" font-family="Georgia,serif" font-size="36">42%</text>
    <text x="544" y="70" fill="#d6c6ae" font-family="monospace" font-size="12" letter-spacing="2">FIRST-YEAR MODEL</text>
  </g>
</svg>
