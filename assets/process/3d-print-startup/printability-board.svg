<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">3D printability rules board</title>
  <desc id="desc">Board showing wall thickness, supports, hollowing, drainage, orientation, and file package checks.</desc>
  <rect width="900" height="675" fill="#f8f3e9"/>
  <rect x="42" y="42" width="816" height="591" fill="#fff8ee" stroke="#d6c6ae" stroke-width="3"/>
  <text x="78" y="114" fill="#14100c" font-family="Georgia,serif" font-size="44" letter-spacing="4">PRINTABILITY RULES</text>
  <text x="80" y="154" fill="#5b554c" font-family="monospace" font-size="18" letter-spacing="2">CHARACTER DESIGN TO STL / 3MF HANDOFF</text>
  <g transform="translate(86 222)">
    <rect width="210" height="118" fill="#f8f3e9" stroke="#d6c6ae" stroke-width="3"/>
    <text x="24" y="48" fill="#9f4828" font-family="monospace" font-size="18">WALL THICKNESS</text>
    <path d="M34 82h142" stroke="#14100c" stroke-width="16" stroke-linecap="round"/>
  </g>
  <g transform="translate(345 222)">
    <rect width="210" height="118" fill="#f8f3e9" stroke="#d6c6ae" stroke-width="3"/>
    <text x="24" y="48" fill="#9f4828" font-family="monospace" font-size="18">SUPPORTS</text>
    <path d="M64 94l42-54 42 54M106 40v74" stroke="#14100c" stroke-width="8" fill="none"/>
  </g>
  <g transform="translate(604 222)">
    <rect width="210" height="118" fill="#f8f3e9" stroke="#d6c6ae" stroke-width="3"/>
    <text x="24" y="48" fill="#9f4828" font-family="monospace" font-size="18">DRAINAGE</text>
    <circle cx="92" cy="82" r="31" fill="none" stroke="#14100c" stroke-width="8"/>
    <circle cx="154" cy="82" r="9" fill="#2c5f77"/>
  </g>
  <g transform="translate(86 400)">
    <rect width="210" height="118" fill="#f8f3e9" stroke="#d6c6ae" stroke-width="3"/>
    <text x="24" y="48" fill="#9f4828" font-family="monospace" font-size="18">ORIENTATION</text>
    <path d="M66 96l76-58 26 78" stroke="#14100c" stroke-width="10" fill="none"/>
  </g>
  <g transform="translate(345 400)">
    <rect width="210" height="118" fill="#f8f3e9" stroke="#d6c6ae" stroke-width="3"/>
    <text x="24" y="48" fill="#9f4828" font-family="monospace" font-size="18">WATERTIGHT</text>
    <path d="M76 90h80l30-42-70-20-66 36z" fill="none" stroke="#14100c" stroke-width="8"/>
  </g>
  <g transform="translate(604 400)">
    <rect width="210" height="118" fill="#f8f3e9" stroke="#d6c6ae" stroke-width="3"/>
    <text x="24" y="48" fill="#9f4828" font-family="monospace" font-size="18">FILE PACK</text>
    <rect x="44" y="70" width="120" height="16" fill="#14100c"/>
    <rect x="44" y="94" width="88" height="16" fill="#2f6a57"/>
