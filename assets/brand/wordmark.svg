<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60" aria-label="Lesly wordmark — italic serif with gold dot ornament">
  <!-- The wordmark -->
  <text x="0" y="44"
        font-family="Playfair Display, Georgia, 'Times New Roman', serif"
        font-size="44"
        font-style="italic"
        font-weight="500"
        fill="currentColor"
        letter-spacing="0.5">Lesly</text>
  <!-- Decorative dot flourish after the wordmark -->
  <g transform="translate(135 32)">
    <circle cx="0" cy="0" r="2" fill="currentColor"/>
    <circle cx="14" cy="0" r="2" fill="currentColor" opacity="0.5"/>
    <circle cx="28" cy="0" r="2" fill="currentColor" opacity="0.25"/>
  </g>
</svg>
